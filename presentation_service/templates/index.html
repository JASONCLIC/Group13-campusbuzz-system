<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Buzz - Submit Event</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f8fafc;
            color: #1e2937;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .form-container {
            width: 100%;
            max-width: 480px;
            background: white;
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0;
        }
        
        h2 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        p {
            color: #64748b;
            margin-bottom: 32px;
            font-size: 15px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 110px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        
        button:hover {
            background: #2563eb;
        }
        
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        
        #resultBox {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14.5px;
            line-height: 1.5;
            min-height: 70px;
        }
        
        .success { background: #ecfdf5; color: #10b981; border: 1px solid #a7f3d0; }
        .error { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Submit Event</h2>
    <p>Share your campus activity with the community</p>

    <form id="eventForm">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea name="description" required></textarea>
        </div>

        <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" required>
        </div>

        <div class="form-group">
            <label>Date (YYYY-MM-DD)</label>
            <input type="text" name="date" required>
        </div>

        <div class="form-group">
            <label>Organizer</label>
            <input type="text" name="organizer" required>
        </div>

        <button type="submit" id="btn">Submit Event</button>
    </form>

    <div id="resultBox"></div>
</div>

<script>
document.getElementById("eventForm").onsubmit = async function(e) {
    e.preventDefault();

    const btn = document.getElementById("btn");
    btn.innerText = "Processing...";
    btn.disabled = true;

    const formData = new FormData(e.target);

    const data = {
        title: formData.get("title"),
        description: formData.get("description"),
        location: formData.get("location"),
        date: formData.get("date"),
        organizer: formData.get("organizer")
    };

    try {
        const response = await fetch('/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        const box = document.getElementById("resultBox");
        box.innerHTML = `
            <strong>Status:</strong> ${result.status}<br>
            <strong>Category:</strong> ${result.category || "-"}<br>
            <strong>Priority:</strong> ${result.priority || "-"}<br>
            <strong>Note:</strong> ${result.note || "-"}
        `;

        if (result.status === "APPROVED") {
            box.className = "success";
            btn.innerText = "✓ Success";
        } else {
            box.className = "error";
            btn.innerText = "Retry";
        }
    } catch (error) {
        const box = document.getElementById("resultBox");
        box.innerHTML = "<strong>Error:</strong> Submission failed, please try again later.";
        box.className = "error";
        btn.innerText = "Retry";
    }

    btn.disabled = false;
};
</script>

</body>
</html>
